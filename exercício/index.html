<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RSA Didático</title>
</head>
<body>

    <h2>Cifrar</h2>
    <textarea id="entrada" placeholder="Texto para cifrar"></textarea><br>
    <button id="btnCifrar">Cifrar</button><br>
    <textarea id="saidaCifrada" placeholder="Resultado (Números)" readonly></textarea>

    <hr>

    <h2>Decifrar</h2>
    <textarea id="entradaCifrada" placeholder="Cole os números aqui (separados por vírgula)"></textarea><br>
    <button id="btnDecifrar">Decifrar</button><br>
    <textarea id="saidaOriginal" placeholder="Texto recuperado" readonly></textarea>

    <script src="script.js"></script>
</body>
</html>
